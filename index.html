<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>今日食运 · 五行八卦测算</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  color:#e8e8e8;
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 16px 40px;
  overflow-x:hidden;
}
/* ========== 首页 ========== */
#page-index{display:flex;flex-direction:column;align-items:center;width:100%;max-width:480px;padding-top:40px}
.header{text-align:center;margin-top:30px}
.header h1{font-size:36px;color:#d4a853;letter-spacing:2px}
.header p{font-size:14px;color:#666;margin-top:6px}
.bagua-area{margin:40px 0;position:relative;width:180px;height:180px}
.bagua-ring{
  width:100%;height:100%;border-radius:50%;
  border:2px solid rgba(212,168,83,.4);
  position:relative;animation:spin 24s linear infinite;
}
.bagua-ring::before{
  content:'☯';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:52px;color:#d4a853;
}
.bagua-char{position:absolute;font-size:20px;color:#d4a853;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.form-card{
  width:100%;background:rgba(255,255,255,.05);
  border-radius:16px;padding:24px 20px;margin-bottom:32px;
}
.form-card label{font-size:15px;color:#d4a853;display:block;margin-bottom:12px;text-align:center}
.form-section{margin-bottom:18px}
.form-section:last-child{margin-bottom:0}
.form-section-title{font-size:13px;color:#888;margin-bottom:8px;text-align:left}
.date-row{display:flex;gap:10px;justify-content:center}
.date-row select{
  flex:1;padding:12px 0;
  background:rgba(255,255,255,.08);color:#e8e8e8;
  border:1px solid rgba(212,168,83,.3);border-radius:10px;
  font-size:16px;text-align:center;
  appearance:none;-webkit-appearance:none;
}
.date-row option{background:#1a1a2e;color:#e8e8e8}
.extra-row{display:flex;gap:10px}
.extra-row select{
  flex:1;padding:12px 0;
  background:rgba(255,255,255,.08);color:#e8e8e8;
  border:1px solid rgba(212,168,83,.3);border-radius:10px;
  font-size:14px;text-align:center;
  appearance:none;-webkit-appearance:none;
}
.extra-row option{background:#1a1a2e;color:#e8e8e8}
.calc-btn{
  width:80%;height:52px;
  background:linear-gradient(135deg,#d4a853,#c4944a);
  border:none;border-radius:26px;
  font-size:18px;font-weight:bold;color:#1a1a2e;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 24px rgba(212,168,83,.35);
  transition:opacity .2s;
}
.calc-btn:active{opacity:.75}
.danmu-bar{margin-top:30px;height:24px;overflow:hidden}
.danmu-text{font-size:12px;color:#555;animation:fade 4s ease infinite}
@keyframes fade{0%,100%{opacity:.3}50%{opacity:1}}
.footer{margin-top:16px;font-size:11px;color:#444}
/* ========== 加载 ========== */
#page-loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
.load-bagua{font-size:64px;color:#d4a853;animation:spin 2s linear infinite}
.load-text{margin-top:16px;font-size:16px;color:#d4a853}
/* ========== 结果页 ========== */
#page-result{display:none;width:100%;max-width:480px}
.result-header{text-align:center;padding:30px 0 20px;border-bottom:1px solid rgba(212,168,83,.2);margin-bottom:20px}
.result-header h2{font-size:20px;color:#d4a853}
.card{
  background:rgba(255,255,255,.04);border-radius:14px;
  padding:18px 16px;margin-bottom:16px;
}
.card-title{font-size:16px;font-weight:bold;color:#d4a853;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(212,168,83,.15)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.info-row .label{color:#777}
.info-row .value{color:#e8e8e8;font-weight:500}
.analysis-text{font-size:14px;color:#bbb;line-height:1.8}
.category-section{margin-bottom:16px}
.category-label{font-size:14px;color:#d4a853;margin-bottom:8px;font-weight:bold}
.food-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.food-item:last-child{border-bottom:none}
.food-name{font-size:16px;font-weight:bold;margin-bottom:4px}
.food-meta{display:flex;justify-content:space-between;font-size:12px;color:#888}
.food-tags{margin-top:6px;display:flex;gap:6px}
.food-tags span{font-size:11px;color:#999;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:6px}
.wuxing-reason{font-size:12px;color:#d4a853;margin-top:4px}
.food-actions{margin-top:10px;display:flex;gap:8px}
.food-actions a{
  flex:1;text-align:center;padding:8px 0;border-radius:8px;
  font-size:12px;font-weight:500;text-decoration:none;
}
.action-meituan{background:#FFC107;color:#333}
.action-eleme{background:#0097E6;color:#fff}
.ji-tip{font-size:13px;color:#ef5350;line-height:1.6}
.ji-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}
.ji-tags span{font-size:12px;color:#ef5350;background:rgba(239,83,80,.1);padding:6px 10px;border-radius:8px}
.lucky-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
.color-dot{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.2)}
.weather-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);padding:4px 10px;border-radius:8px;
  font-size:13px;color:#aaa;margin-bottom:12px;
}
.share-area{text-align:center;margin-top:8px;padding-bottom:20px}
.share-btn{
  display:inline-block;padding:14px 40px;
  background:linear-gradient(135deg,#d4a853,#c4944a);
  border-radius:24px;font-size:16px;font-weight:bold;
  color:#1a1a2e;text-decoration:none;
  box-shadow:0 4px 16px rgba(212,168,83,.3);
}
.share-hint{font-size:11px;color:#555;margin-top:10px}
.back-btn{
  position:fixed;top:16px;left:16px;z-index:10;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.1);border:none;
  color:#d4a853;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>

          <option value="上海">上海</option>

          <option value="厦门">厦门</option>

  </div>

  <button class="calc-btn" onclick="calc()">🔮 开始今日测算</button>

  <div class="danmu-bar"><span class="danmu-text" id="danmu">张三测算了今天宜吃麻辣香锅</span></div>
  <div class="footer">── 趣味娱乐 · 仅供参考 ──</div>
</div>

<!-- ========== 加载 ========== -->
<div id="page-loading">
  <div class="load-bagua">☰</div>
  <div class="load-text">天机推演中...</div>
</div>

<!-- ========== 结果页 ========== -->
<div id="page-result">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="result-header">
    <h2>🔮 今日食运</h2>
    <p id="result-date" style="font-size:13px;color:#888;margin-top:4px"></p>
  </div>

  <div class="card">
    <div class="card-title">基本信息</div>
    <div class="info-row"><span class="label">本命五行</span><span class="value" id="r-ming"></span></div>

    <div class="info-row"><span class="label">本命卦象</span><span class="value" id="r-bagua"></span></div>

    <div class="card-title">📜 运势解读</div>
    <div class="analysis-text" id="r-reason"></div>
  </div>

  <div class="card">
    <div class="card-title">✅ 今日宜</div>
    <div id="r-yi-foods"></div>
  </div>

  <div class="card">
    <div class="card-title">❌ 今日忌</div>
    <p class="ji-tip" id="r-ji-tip"></p>
    <div class="ji-tags" id="r-ji-tags"></div>
  </div>

  <div class="card">
    <div class="card-title">🌟 幸运小贴士</div>
    <div class="weather-badge" id="r-weather"></div>
    <div class="lucky-row"><span>幸运色</span><div class="color-dot" id="r-color"></div></div>
    <div class="lucky-row"><span>最佳用餐时间</span><span id="r-time" style="font-weight:500"></span></div>
  </div>

  <div class="share-area">
    <a class="share-btn" id="share-btn" href="#">📤 分享给好友测算</a>
    <p class="share-hint">让朋友也测测今天该吃什么</p>
  </div>
</div>

<script>
// ============================
//  基础数据
// ============================
var TIAN_GAN=[
  {name:'甲',wuxing:'木'},{name:'乙',wuxing:'木'},

var WX={
  '金':{e:'⚔️',c:'#C0C0C0',d:'辛辣、收敛',relation:'金主肃杀，宜辛散之味'},
  '木':{e:'🌿',c:'#4CAF50',d:'酸味、生长',relation:'木主生发，宜酸爽清新'},
  '水':{e:'💧',c:'#2196F3',d:'咸鲜、滋润',relation:'水主润泽，宜鲜美滋养'},
  '火':{e:'🔥',c:'#F44336',d:'苦焦、炎热',relation:'火主炎上，宜辛热发散'},
  '土':{e:'🏔️',c:'#FF9800',d:'甘甜、承载',relation:'土主化育，宜甘甜厚味'}
};
var KE={木:'土',土:'水',水:'火',火:'金',金:'木'};
var KE_BY={土:'木',水:'土',火:'水',金:'火',木:'金'};
var SHENG_BY={火:'木',土:'火',金:'土',水:'金',木:'水'};
var SHENG={木:'火',火:'土',土:'金',金:'水',水:'木'};

// ============================
//  星座
// ============================
var ZODIAC_LIST=['摩羯','水瓶','双鱼','白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯'];
var ZODIAC_DATES=[{m:1,d:1},{m:1,d:20},{m:2,d:19},{m:3,d:21},{m:4,d:20},{m:5,d:21},{m:6,d:21},{m:7,d:23},{m:8,d:23},{m:9,d:23},{m:10,d:24},{m:11,d:23},{m:12,d:22}];
var ZODIAC_META={
  '白羊':{e:'♈',pref:'火',desc:'冲动热情，宜重口美食'},
  '金牛':{e:'♉',pref:'土',desc:'稳重务实，宜家常菜'},
  '双子':{e:'♊',pref:'木',desc:'多变好奇，宜新奇口味'},
  '巨蟹':{e:'♋',pref:'水',desc:'顾家温和，宜汤粥炖品'},
  '狮子':{e:'♌',pref:'火',desc:'霸气张扬，宜大份聚餐'},
  '处女':{e:'♍',pref:'土',desc:'精致讲究，宜健康轻食'},
  '天秤':{e:'♎',pref:'金',desc:'优雅平衡，宜精致日料'},
  '天蝎':{e:'♏',pref:'水',desc:'深沉神秘，宜重口夜宵'},
  '射手':{e:'♐',pref:'火',desc:'自由奔放，宜异国风味'},
  '摩羯':{e:'♑',pref:'土',desc:'踏实可靠，宜饱腹暖胃'},
  '水瓶':{e:'♒',pref:'金',desc:'创新独特，宜创意融合'},
  '双鱼':{e:'♓',pref:'水',desc:'浪漫梦幻，宜甜品奶茶'}
};
function getZodiac(m,d){
  var idx=0;
  for(var i=0;i<ZODIAC_DATES.length-1;i++){
    if(m===ZODIAC_DATES[i+1].m && d<ZODIAC_DATES[i+1].d){idx=i;break}
    if(m===ZODIAC_DATES[i].m && d>=ZODIAC_DATES[i].d && m<ZODIAC_DATES[i+1].m){idx=i;break}
  }
  if(m>=12 && d>=22) idx=12; //摩羯
  return ZODIAC_LIST[idx];
}

// ============================
//  城市天气（模拟）
// ============================
var WEATHER_DB={
  '上海':{e:'🌧️',type:'rainy',temp:'适中',desc:'阴雨绵绵',weatherColor:'#4A90D9'},
  '北京':{e:'🌬️',type:'cold',temp:'偏冷',desc:'干燥多风',weatherColor:'#90CAF9'},
  '广州':{e:'☀️',type:'hot',temp:'炎热',desc:'高温闷热',weatherColor:'#FF7043'},
  '深圳':{e:'☀️',type:'hot',temp:'炎热',desc:'高温潮湿',weatherColor:'#FF7043'},
  '杭州':{e:'🌧️',type:'rainy',temp:'适中',desc:'细雨蒙蒙',weatherColor:'#4A90D9'},
  '成都':{e:'🌫️',type:'humid',temp:'潮湿',desc:'阴湿多云',weatherColor:'#A5D6A7'},
  '重庆':{e:'🌫️',type:'humid',temp:'潮湿',desc:'闷热潮湿',weatherColor:'#A5D6A7'},

  '哈尔滨':{e:'❄️',type:'cold',temp:'严寒',desc:'冰天雪地',weatherColor:'#90CAF9'}
};
function getWeather(city){
  if(!city || !WEATHER_DB[city]) return {e:'🌤️',type:'normal',temp:'适中',desc:'天气舒适',weatherColor:'#81C784'};
  return WEATHER_DB[city];
}

// 天气对推荐的加分规则（返回宜吃的五行偏好 + 菜系偏好）
function weatherBoost(weather, dayWX){
  var boost={wx:null, cuisine:null, tip:''};
  switch(weather.type){
    case 'cold':
      boost.wx='火'; boost.cuisine='火锅';
      boost.tip='天气'+weather.temp+'，宜吃'+WX['火'].e+'系热食暖身';
      break;
    case 'hot':
      boost.wx='水'; boost.cuisine='轻食';
      boost.tip='天气'+weather.temp+'，宜吃'+WX['水'].e+'系清凉解暑';
      break;
    case 'rainy':
      boost.wx='土'; boost.cuisine='家常菜';
      boost.tip=weather.desc+'，宜吃'+WX['土'].e+'系暖胃驱湿';
      break;
    case 'humid':
      boost.wx='金'; boost.cuisine='川菜';
      boost.tip=weather.desc+'，宜吃'+WX['金'].e+'系辛辣祛湿';
      break;
    case 'warm':
      boost.wx='木'; boost.cuisine='日料';
      boost.tip=weather.desc+'，宜吃'+WX['木'].e+'系清爽怡人';
      break;
    case 'cool':
      boost.wx='水'; boost.cuisine='海鲜';
      boost.tip=weather.desc+'，宜吃'+WX['水'].e+'系鲜美滋养';
      break;
    default:
      boost.wx=dayWX; boost.tip='天气舒适，随心而食';
  }
  return boost;
}

// ============================

var FOODS=[
  // 金
  {n:'凉拌三丝',w:'金',c:'凉菜',p:'10-20',cat:'前菜',t:['清爽','开胃']},

// ============================
//  工具函数
// ============================
function seededShuffle(a, seed){
  var b=a.slice();
  var s=seed;
  function rand(){s=(s*16807)%2147483647;return(s-1)/2147483646}
  for(var i=b.length-1;i>0;i--){var j=Math.floor(rand()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}
  return b;
}

// ============================
//  八卦映射（年+月+日 → 确保每人不同）
// ============================
var BAGUA=[
  {name:'乾',symbol:'☰',wuxing:'金',trait:'刚健，宜精致'},
  {name:'兑',symbol:'☱',wuxing:'金',trait:'愉悦，宜聚餐'},
  {name:'离',symbol:'☲',wuxing:'火',trait:'热情，宜重口'},
  {name:'震',symbol:'☳',wuxing:'木',trait:'活力，宜快捷'},
  {name:'巽',symbol:'☴',wuxing:'木',trait:'温和，宜清淡'},
  {name:'坎',symbol:'☵',wuxing:'水',trait:'深沉，宜温暖'},
  {name:'艮',symbol:'☶',wuxing:'土',trait:'稳重，宜饱腹'},
  {name:'坤',symbol:'☷',wuxing:'土',trait:'包容，宜家常'}
];
function getPersonalBagua(y,m,d){return BAGUA[(y+m+d)%8]}

// ============================
//  核心测算
// ============================
function calc(){
  var y=parseInt(document.getElementById('sel-year').value);
  var m=parseInt(document.getElementById('sel-month').value);
  var d=parseInt(document.getElementById('sel-day').value);
  var zodiacInput=document.getElementById('sel-zodiac').value;
  var city=document.getElementById('sel-city').value;
  var today=new Date();

  var ming=TIAN_GAN[(y-4)%10].wuxing;
  var sx=DI_ZHI[(y-4)%12].animal;

  // 星座（自动识别 or 手动选择）
  var zodiac=zodiacInput || getZodiac(m,d);
  var zodiacMeta=ZODIAC_META[zodiac];

  // 天气
  var weather=getWeather(city);

  // 日柱
  var base=new Date(1900,0,1);
  var diff=Math.floor((today.getTime()-base.getTime())/86400000);
  var dayTG=TIAN_GAN[((diff%10)+10)%10];
  var dayDZ=DI_ZHI[((diff%12)+12)%12];
  var dayWX=dayTG.wuxing;

  // 个人卦象（年+月+日，确保每人不同）
  var personalBagua=getPersonalBagua(y,m,d);

  // 五行关系
  var yi,ji,relation;
  if(dayWX===ming){
    yi=ming;ji=KE_BY[ming];
    relation='比和';
  }else if(SHENG_BY[dayWX]===ming){
    yi=ming;ji=KE[ming];
    relation='今日生你';
  }else if(SHENG[ming]===dayWX){
    yi=dayWX;ji=KE_BY[ming];
    relation='你生今日';
  }else if(KE[dayWX]===ming){
    yi=SHENG_BY[ming];ji=dayWX;
    relation='今日克你';
  }else if(KE[ming]===dayWX){
    yi=dayWX;ji=KE[dayWX];
    relation='你克今日';
  }else{
    yi=ming;ji=KE[ming];
    relation='平和';
  }

  // 天气加权 → 调整推荐偏好
  var weatherTip=weatherBoost(weather,dayWX);
  var weatherWX=weatherTip.wx;

  // 运势解读
  var reasonText=buildReason(ming,dayWX,dayTG.name,dayDZ.name,sx,zodiac,zodiacMeta,relation,yi,ji,weather,weatherWX);

  // 用完整生日+星座+城市做种子，确保每个人不同排列
  var seed=y*10000+m*100+d;
  if(zodiac) seed+=zodiac.charCodeAt(0)*100;
  if(city) seed+=city.charCodeAt(0);

  // 排序：天气偏好 > 宜的五行 > 其余
  var allYiFoods=FOODS.filter(function(f){return f.w===yi});
  var weatherFoods=[];
  var otherFoods=[];
  for(var i=0;i<allYiFoods.length;i++){
    if(weatherWX && allYiFoods[i].c===weather.cuisine) weatherFoods.push(allYiFoods[i]);
    else otherFoods.push(allYiFoods[i]);
  }
  // 天气偏好放前面
  weatherFoods=seededShuffle(weatherFoods,seed);
  otherFoods=seededShuffle(otherFoods,seed+7777);
  var yiFoods=weatherFoods.concat(otherFoods).slice(0,5);

  var jiFoods=seededShuffle(FOODS.filter(function(f){return f.w===ji}),seed+9999);

  // 幸运色：五行本色 + 星座/天气调整
  var finalColor=WX[ming].c;
  if(weather.type==='hot') finalColor=WX['水'].c;
  else if(weather.type==='cold') finalColor=WX['火'].c;
  else if(zodiacMeta) finalColor=WX[zodiacMeta.pref]?WX[zodiacMeta.pref].c:WX[ming].c;

  var hours={木:'05:00-07:00',火:'11:00-13:00',土:'07:00-09:00',金:'15:00-17:00',水:'21:00-23:00'};
  var ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  renderResult({
    date:ds, ming:ming, sx:sx, gz:dayTG.name+dayDZ.name, dayWX:dayWX,
    yi:yi, ji:ji, reason:reasonText,
    yiFoods:yiFoods, jiFoods:jiFoods,
    color:finalColor, time:hours[ming],
    bagua:personalBagua,
    zodiac:zodiac, zodiacMeta:zodiacMeta,
    weather:weather, weatherTip:weatherTip, city:city
  });
}

function buildReason(ming,dayWX,tgName,dzName,sx,zodiac,zodiacMeta,relation,yi,ji,weather,weatherWX){
  var wxMeta=WX[ming];
  var dayMeta=WX[dayWX];

  var relationDesc={
    '比和':'今日'+dayMeta.d.slice(0,2)+'与你的'+wxMeta.d.slice(0,2)+'同气相求',
    '今日生你':'今日'+dayMeta.d.slice(0,2)+'生你的'+wxMeta.d.slice(0,2)+'，得天时之助',
    '你生今日':'你的'+wxMeta.d.slice(0,2)+'生今日'+dayMeta.d.slice(0,2)+'，顺势而为',
    '今日克你':'今日'+dayMeta.d.slice(0,2)+'克你的'+wxMeta.d.slice(0,2)+'，需以食化解',
    '你克今日':'你的'+wxMeta.d.slice(0,2)+'克今日'+dayMeta.d.slice(0,2)+'，运势可控',
    '平和':'今日五行平和，气机通达'
  };

  var zodiacPart=zodiac?'，'+zodiacMeta.d:'';
  var weatherPart=weather.desc?'，'+weather.desc+'':'';
  var yiMeta=WX[yi];
  var foodReason='今日宜食'+yiMeta.e+yiMeta.d.slice(0,2)+'之品'+yiMeta.relation+'，吃对食物才能旺运';

  return relationDesc[relation]+zodiacPart+weatherPart+'，'+foodReason;
}

// ============================
//  渲染结果
// ============================
function renderResult(r){
  document.getElementById('page-index').style.display='none';
  document.getElementById('page-loading').style.display='flex';
  document.getElementById('page-result').style.display='none';

  setTimeout(function(){
    document.getElementById('page-loading').style.display='none';
    document.getElementById('page-result').style.display='block';

    document.getElementById('result-date').textContent='🔮 '+r.date;
    document.getElementById('r-ming').textContent=WX[r.ming].e+' '+r.ming+'命';
    document.getElementById('r-sx').textContent='🐾 '+r.sx;
    document.getElementById('r-zodiac').textContent=(ZODIAC_META[r.zodiac]?ZODIAC_META[r.zodiac].e:'⭐')+' '+r.zodiac+'座';
    document.getElementById('r-gz').textContent=r.gz;
    document.getElementById('r-day').textContent=WX[r.dayWX].e+' '+r.dayWX;
    document.getElementById('r-bagua').textContent=r.bagua.symbol+' '+r.bagua.name+' → '+r.bagua.trait;
    document.getElementById('r-reason').innerHTML=r.reason;

    // ===== 菜品分类渲染 =====
    var yiHtml='';
    var categories=[
      {key:'前菜',icon:'🥗',label:'前菜'},
      {key:'主菜',icon:'🍲',label:'主菜'},
      {key:'甜点',icon:'🍰',label:'甜点 / 奶茶'}
    ];
    categories.forEach(function(cat){
      var foods=r.yiFoods.filter(function(f){return f.cat===cat.key;});
      if(foods.length===0) return;
      yiHtml+='<div class="category-section">';
      yiHtml+='<div class="category-label">'+cat.icon+' '+cat.label+'</div>';
      foods.forEach(function(f){
        var wxRelation=WX[r.yi].relation;
        if(r.weather.cuisine && f.c===r.weather.cuisine) wxRelation+=' 🌟 天气加分';
        yiHtml+='<div class="yi-food">'
          +'<div class="food-name">'+f.n+'</div>'
          +'<div class="food-meta"><span>'+f.c+'</span><span>¥'+f.p+'</span></div>'
          +'<div class="wuxing-reason">'+WX[r.yi].e+' 五行属'+r.yi+' → '+wxRelation+'</div>'
          +'<div class="food-tags">'+f.t.map(function(t){return '<span>'+t+'</span>'}).join('')+'</div>'
          +'<div class="food-actions">'
          +'<a class="action-meituan" href="https://mp.meituan.com/search?keyword='+encodeURIComponent(f.n)+'" target="_blank">去美团点 ›</a>'
          +'<a class="action-eleme" href="https://h5.ele.me/search?keyword='+encodeURIComponent(f.n)+'" target="_blank">去饿了么点 ›</a>'
          +'</div></div>';
      });
      yiHtml+='</div>';
    });
    document.getElementById('r-yi-foods').innerHTML=yiHtml;

    // 今日忌
    var jiMeta=WX[r.ji];
    document.getElementById('r-ji-tip').textContent='今日不宜吃'+jiMeta.e+' '+jiMeta.d+'类菜品，建议忍一忍~';
    var jiHtml='';
    r.jiFoods.forEach(function(f){jiHtml+='<span>🚫 '+f.n+'</span>'});
    document.getElementById('r-ji-tags').innerHTML=jiHtml;

    // 天气 + 幸运小贴士
    document.getElementById('r-weather').innerHTML=r.weather.e+' '+r.city+' · '+r.weather.desc+' ('+r.weather.temp+')';
    document.getElementById('r-color').style.background=r.color;
    document.getElementById('r-time').textContent=r.time;

    var shareUrl=location.origin+location.pathname;
    document.getElementById('share-btn').href=shareUrl;

    localStorage.setItem('birth',JSON.stringify({
      y:parseInt(document.getElementById('sel-year').value),
      m:parseInt(document.getElementById('sel-month').value),
      d:parseInt(document.getElementById('sel-day').value)
    }));
  },1500);
}
