function tempDesc(t){
  if(t<=0) return '严寒';if(t<=10) return '偏冷';if(t<=20) return '适中';
  if(t<=28) return '偏热';return '炎热';
}
function tempType(t){
  if(t<=5) return 'cold';if(t<=20) return 'cool';
  if(t<=30) return 'warm';return 'hot';
}
function weatherIcon(code,isNight){
  if(code>=71) return '❄️';if(code>=51) return '🌧️';if(code>=40) return '🌫️';
  if(code>=3) return '☁️';if(code>=1) return isNight?'🌙':'🌤️';
  return isNight?'🌙':'☀️';
}

// WMO天气代码 → 描述
var WMO_DESC={
  0:'晴朗无云',1:'大部晴朗',2:'局部多云',3:'多云',
  45:'有雾',48:'凝雾',51:'小毛毛雨',53:'中毛毛雨',55:'大毛毛雨',
  56:'冻毛毛雨',57:'重冻毛毛雨',61:'小雨',63:'中雨',65:'大雨',
  66:'冻小雨',67:'冻大雨',71:'小雪',73:'中雪',75:'大雪',
  77:'雪粒',80:'小阵雨',81:'中阵雨',82:'大阵雨',
  85:'小阵雪',86:'大阵雨',95:'雷暴',96:'雷暴冰雹',99:'强雷暴冰雹'
};

function parseWeather(data, cityName){
  var cur=data.current;
  var temp=Math.round(cur.temperature_2m);
  var code=cur.weather_code;
  var isNight=cur.is_day===0;
  var desc=WMO_DESC[code]||'未知';
  var tt=tempType(temp);
  if(code>=51&&code<=67) tt='rainy';
  if(code>=71) tt='cold';
  if(code>=45&&code<=48) tt='rainy';

  return {
    e:weatherIcon(code,isNight),type:tt,
    temp:tempDesc(temp),
    desc:desc,
    realTemp:temp,
    weatherColor: tt==='hot'?'#FF7043':tt==='cold'||tt==='rainy'?'#90CAF9':'#81C784',
    cuisine:null, // 由 weatherBoost 填充
    tip:cityName+' '+tempDesc(temp)+weatherIcon(code,isNight)
  };
}

async function fetchRealWeather(cityName){
  if(!cityName || !CITY_COORDS[cityName]) return null;
  var coord=CITY_COORDS[cityName];
  try{
    var url='https://api.open-meteo.com/v1/forecast?latitude='+coord.lat
      +'&longitude='+coord.lon
      +'&current=temperature_2m,weather_code,is_day'
      +'&temperature_unit=celsius&timezone=auto';
    var resp=await fetch(url);
    var data=await resp.json();
    return parseWeather(data, cityName);
  }catch(e){
    console.warn('天气API失败，使用默认值:', e);
    return null;
  }
}

// 天气对推荐的加分规则（返回宜吃的五行偏好 + 菜系偏好）
function weatherBoost(weather, dayWX){
  var boost={wx:null, cuisine:null, tip:''};
  switch(weather.type){
    case 'cold':
      boost.wx='火'; boost.cuisine='火锅';
      boost.tip='天气'+weather.temp+'，宜吃'+WX['火'].e+'系热食暖身';
      break;
    case 'hot':
      boost.wx='水'; boost.cuisine='轻食';
      boost.tip='天气'+weather.temp+'，宜吃'+WX['水'].e+'系清凉解暑';
      break;
    case 'rainy':
      boost.wx='土'; boost.cuisine='家常菜';
      boost.tip=weather.desc+'，宜吃'+WX['土'].e+'系暖胃驱湿';
      break;
    case 'humid':
      boost.wx='金'; boost.cuisine='川菜';
      boost.tip='潮湿闷热，宜吃'+WX['金'].e+'系辛辣祛湿';
      break;
    case 'warm':
      boost.wx='木'; boost.cuisine='日料';
      boost.tip='天气宜人，宜吃'+WX['木'].e+'系清爽怡人';
      break;
    case 'cool':
      boost.wx='水'; boost.cuisine='海鲜';
      boost.tip='天气清凉，宜吃'+WX['水'].e+'系鲜美滋养';
      break;
    default:
      boost.wx=dayWX; boost.cuisine=''; boost.tip='天气舒适，随心而食';
  }
  return boost;
}

function seededShuffle(a, seed){
  var b=a.slice();
  var s=seed;
  function rand(){s=(s*16807)%2147483647;return(s-1)/2147483646}
  for(var i=b.length-1;i>0;i--){var j=Math.floor(rand()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}
  return b;
}

function calc(){
  var y=parseInt(document.getElementById('sel-year').value);
  var m=parseInt(document.getElementById('sel-month').value);
  var d=parseInt(document.getElementById('sel-day').value);
  var zodiacInput=document.getElementById('sel-zodiac').value;
  var city=document.getElementById('sel-city').value;

  // 先显示加载动画
  document.getElementById('page-index').style.display='none';
  document.getElementById('page-loading').style.display='flex';

  // 异步获取实时天气
  fetchRealWeather(city).then(function(realWeather){
    var weather=realWeather || {
      e:'🌤️',type:'warm',temp:'适中',desc:'天气舒适',
      realTemp:25,weatherColor:'#81C784',cuisine:'',tip:'天气舒适，随心而食'
    };
    doCalculation(y,m,d,zodiacInput,city,weather);
  });
}

function doCalculation(y,m,d,zodiacInput,city,weather){
  var today=new Date();
  var dayOfWeek=today.getDay(); // 0=周日, 1=周一, ..., 6=周六

  var ming=TIAN_GAN[(y-4)%10].wuxing;
  var sx=DI_ZHI[(y-4)%12].animal;

  // 星座（自动识别 or 手动选择）
  var zodiac=zodiacInput || getZodiac(m,d);
  var zodiacMeta=ZODIAC_META[zodiac];

  // 日柱
  var base=new Date(1900,0,1);
  var diff=Math.floor((today.getTime()-base.getTime())/86400000);
  var dayTG=TIAN_GAN[((diff%10)+10)%10];
  var dayDZ=DI_ZHI[((diff%12)+12)%12];
  var dayWX=dayTG.wuxing;

  // 个人卦象（年+月+日，确保每人不同）
  var personalBagua=getPersonalBagua(y,m,d);

  // 五行关系
  var yi,ji,relation;
  if(dayWX===ming){
    yi=ming;ji=KE_BY[ming];
    relation='比和';
  }else if(SHENG_BY[dayWX]===ming){
    yi=ming;ji=KE[ming];
    relation='今日生你';
  }else if(SHENG[ming]===dayWX){
    yi=dayWX;ji=KE_BY[ming];
    relation='你生今日';
  }else if(KE[dayWX]===ming){
    yi=SHENG_BY[ming];ji=dayWX;
    relation='今日克你';
  }else if(KE[ming]===dayWX){
    yi=dayWX;ji=KE[dayWX];
    relation='你克今日';
  }else{
    yi=ming;ji=KE[ming];
    relation='平和';
  }

  // 天气加权 → 调整推荐偏好
  var weatherTip=weatherBoost(weather,dayWX);
  var weatherWX=weatherTip.wx;

  // 运势解读
  var reasonText=buildReason(ming,dayWX,dayTG.name,dayDZ.name,sx,zodiac,zodiacMeta,relation,yi,ji,weather,weatherWX);

  // 用完整生日+星座+城市做种子，确保每个人不同排列
  var seed=y*10000+m*100+d;
  if(zodiac) seed+=zodiac.charCodeAt(0)*100;
  if(city) seed+=city.charCodeAt(0);

  // 评分排序：不同城市/星座/生日 → 不同菜品
  var allYiFoods=FOODS.filter(function(f){return f.w===yi});
  var allJiFoods=FOODS.filter(function(f){return f.w===ji});

  // 星期推荐规则（不同星期推荐不同五行）
  var WEEKDAY_PREF={
    0:'火', // 周日：火系（热闹聚餐）
    1:'木', // 周一：木系（清爽开胃，迎接新一周）
    2:'土', // 周二：土系（饱腹扎实，工作有力）
    3:'金', // 周三：金系（辛辣刺激，提振精神）
    4:'水', // 周四：水系（滋补汤品，为周末蓄力）
    5:'火', // 周五：火系（周末狂欢，热辣开场）
    6:'土'  // 周六：土系（家常舒适，享受时光）
  };
  var weekdayPref=WEEKDAY_PREF[dayOfWeek];

  // 城市推荐菜系（根据城市特色）
  var CITY_CUISINE={
    '上海':'本帮菜',
    '北京':'家常菜',
    '广州':'粤菜',
    '深圳':'粤菜',
    '成都':'川菜',
    '重庆':'川菜',
    '武汉':'川菜',
    '长沙':'湘菜',
    '西安':'西北菜',
    '杭州':'轻食',
    '南京':'家常菜',
    '厦门':'海鲜',
    '青岛':'海鲜',
    '大连':'海鲜',
    '三亚':'海鲜',
    '桂林':'家常菜',
    '昆明':'家常菜',
    '哈尔滨':'东北菜',
    '沈阳':'东北菜'
  };
  var cityCuisine=CITY_CUISINE[city];

  // 为每道菜计算个人分数
  function scoreFood(food, baseSeed){
    var score=0;
    // 天气偏好：匹配的菜系 +3 分
    if(weatherTip.cuisine && food.c===weatherTip.cuisine) score+=3;
    if(weather.cuisine && food.c===weather.cuisine) score+=2;
    // 城市偏好：匹配城市特色菜系 +2 分
    if(cityCuisine && food.c===cityCuisine) score+=2;
    // 星期偏好：匹配星期推荐五行 +2 分
    if(weekdayPref && food.w===weekdayPref) score+=2;
    // 星座偏好：匹配星座喜好的五行 +1 分
    if(zodiacMeta.pref && food.w===zodiacMeta.pref) score+=1;
    // 卦象偏好：匹配的五行 +1 分
    if(personalBagua.wuxing && food.w===personalBagua.wuxing) score+=1;
    // 基于种子给一个 0~1 的随机偏移，确保不同人生日即使分数相同也有不同排序
    var s=baseSeed;
    var nameChars=0;
    for(var ci=0;ci<food.n.length;ci++) nameChars+=food.n.charCodeAt(ci);
    s=(s*16807+nameChars)%2147483647;
    var jitter=(s%100)/100;
    return score+jitter;
  }

  var yiFoods=allYiFoods.map(function(f){return {food:f,score:scoreFood(f,seed)};})
    .sort(function(a,b){return b.score-a.score;})
    .map(function(x){return x.food;})
    .slice(0,4);

  var jiFoods=allJiFoods.map(function(f){return {food:f,score:scoreFood(f,seed+9999)};})
    .sort(function(a,b){return b.score-a.score;})
    .map(function(x){return x.food;})
    .slice(0,3);

  // 幸运色：五行本色 + 天气调整
  var finalColor=WX[ming].c;
  if(weather.type==='hot') finalColor=WX['水'].c;
  else if(weather.type==='cold') finalColor=WX['火'].c;
  else if(zodiacMeta.pref && WX[zodiacMeta.pref]) finalColor=WX[zodiacMeta.pref].c;

  var hours={木:'05:00-07:00',火:'11:00-13:00',土:'07:00-09:00',金:'15:00-17:00',水:'21:00-23:00'};
  var ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  renderResult({
    date:ds, ming:ming, sx:sx, gz:dayTG.name+dayDZ.name, dayWX:dayWX,
    yi:yi, ji:ji, reason:reasonText, relation:relation,
    yiFoods:yiFoods, jiFoods:jiFoods,
    color:finalColor, time:hours[ming],
    bagua:personalBagua,
    zodiac:zodiac, zodiacMeta:zodiacMeta,
    weather:weather, weatherTip:weatherTip, city:city
  });
}

function buildReason(ming,dayWX,tgName,dzName,sx,zodiac,zodiacMeta,relation,yi,ji,weather,weatherWX){
  var wxMeta=WX[ming];
  var dayMeta=WX[dayWX];

  var relationDesc={
    '比和':'今日'+dayMeta.d.slice(0,2)+'与你的'+wxMeta.d.slice(0,2)+'同气相求，五行和谐',
    '今日生你':'今日'+dayMeta.d.slice(0,2)+'生你的'+wxMeta.d.slice(0,2)+'，得天时之助，运势拔高',
    '你生今日':'你的'+wxMeta.d.slice(0,2)+'生今日'+dayMeta.d.slice(0,2)+'，顺势而为，大展宏图',
    '今日克你':'今日'+dayMeta.d.slice(0,2)+'克你的'+wxMeta.d.slice(0,2)+'，需以食化解，见机而动',
    '你克今日':'你的'+wxMeta.d.slice(0,2)+'克今日'+dayMeta.d.slice(0,2)+'，运势可控，蓄势待发',
    '平和':'今日五行平和，气机通达，万事顺利'
  };

  var zodiacPart=zodiac&&zodiacMeta&&zodiacMeta.desc?'，'+zodiacMeta.desc:'';
  var weatherPart=weather.desc?'，'+weather.desc+'':'';
  var yiMeta=WX[yi];
  var foodReason='今日宜食'+yiMeta.e+yiMeta.d.slice(0,2)+'之品'+yiMeta.relation+'，吃对食物才能旺运。';

  return relationDesc[relation]+zodiacPart+weatherPart+'。'+foodReason;
}

// ============================
//  运势指南生成（增强神秘感）
// ============================
function buildFortuneGuide(ming, dayWX, zodiac, city, weather){
  // 方向映射（五行方位）
  var directions={
    '木':['东方','东北'],
    '火':['南方','东南'],
    '土':['中央','四方'],
    '金':['西方','西北'],
    '水':['北方','西南']
  };

  // 颜色描述
  var colorDescs={
    '#4CAF50':'翠绿色（生机勃勃，新生之力）',
    '#F44336':'深红色（热烈奔放，激情之心）',
    '#2196F3':'深蓝色（冷静从容，智慧之光）',
    '#C0C0C0':'银白色（纯净锐利，行动之力）',
    '#FF9800':'金黄色（温暖厚重，承载之心）'
  };

  // 幸运数字（五行的数字）
  var luckyNumbers={
    '木':'3,8',
    '火':'2,7',
    '土':'5,10',
    '金':'4,9',
    '水':'1,6'
  };

  // 整体运势评价（根据五行关系）
  var fortuneTexts={
    '比和':'五行和谐，气运平稳。今日是修养蓄力的好时机，切忌浮躁，静水深流方能成事。',
    '生扶':'天时眷顾，星运拱照。今日百事顺心，宜主动出击，把握机遇。前路光明，前行无阻。',
    '克制':'五行相克，需要调和。今日低调行事，多做准备，静观其变。吃对食物可化解不利，转危为机。',
    '平和':'五行循环，互为相生。今日宜修养身心，培养实力，为后日之进步蓄能。'
  };

  var dir=directions[ming][Math.random()>0.5?1:0];
  var color=WX[ming].c;
  var colorDesc=colorDescs[color]||'幸运之色';
  var num=luckyNumbers[ming];
  var fortuneType=dayWX===ming?'比和':(SHENG_BY[dayWX]===ming?'生扶':(KE[dayWX]===ming?'克制':'平和'));
  var fortune=fortuneTexts[fortuneType];

  // 如果有天气，加入天气建议
  if(weather && weather.type==='hot'){
    fortune='天气炎热，宜饮水补阴。'+fortune;
  }else if(weather && weather.type==='cold'){
    fortune='天气寒冷，宜温阳进补。'+fortune;
  }else if(weather && weather.type==='rainy'){
    fortune='天气阴雨，宜驱湿进补。'+fortune;
  }

  return{
    direction:'🧭 '+dir+'（五行'+ming+'系方位）',
    colorDesc:colorDesc,
    luckyNumber:'✨ '+num,
    overallFortune:'【今日运势】'+fortune
  };
}

// ============================
//  初始化
// ============================
(function(){
  // 显示今日日期和干支
  var today=new Date();
  var y=today.getFullYear();
  var m=today.getMonth()+1;
  var d=today.getDate();
  var dayOfWeek=['日','一','二','三','四','五','六'][today.getDay()];
  var dateStr=y+'年'+m+'月'+d+'日 星期'+dayOfWeek;
  document.getElementById('today-date').textContent=dateStr;

  // 计算今日干支
  var base=new Date(1900,0,1);
  var diff=Math.floor((today.getTime()-base.getTime())/86400000);
  var dayTG=TIAN_GAN[((diff%10)+10)%10];
  var dayDZ=DI_ZHI[((diff%12)+12)%12];
  document.getElementById('today-gz').textContent='【'+dayTG.name+dayDZ.name+'·'+dayTG.wuxing+'】';

  var sy=document.getElementById('sel-year');
  for(var y=2015;y>=1940;y--){var o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===1995)o.selected=true;sy.appendChild(o)}
  var sm=document.getElementById('sel-month');
  for(var m=1;m<=12;m++){var o=document.createElement('option');o.value=m;o.textContent=m+'月';sm.appendChild(o)}
  var sd=document.getElementById('sel-day');
  for(var d=1;d<=31;d++){var o=document.createElement('option');o.value=d;o.textContent=d+'日';sd.appendChild(o)}

  try{
    var b=JSON.parse(localStorage.getItem('birth'));
    if(b){sy.value=b.y;sm.value=b.m;sd.value=b.d}
  }catch(e){}

  // 星座自动识别：当月/日变化时自动更新星座选择
  function updateZodiac(){
    var m=parseInt(document.getElementById('sel-month').value);
    var d=parseInt(document.getElementById('sel-day').value);
    if(m && d){
      var zodiac=getZodiac(m,d);
      var zodiacSelect=document.getElementById('sel-zodiac');
      // 只有当选择"自动识别"时才更新
      if(zodiacSelect.value===''){
        // 在页面上显示星座提示（不改变select的值，保持"自动识别"状态）
        var zodiacMeta=ZODIAC_META[zodiac];
        var tip=document.getElementById('zodiac-hint');
        if(!tip){
          tip=document.createElement('div');
          tip.id='zodiac-hint';
          tip.style.cssText='font-size:12px;color:#d4a853;margin-top:8px;text-align:center;';
          zodiacSelect.parentNode.appendChild(tip);
        }
        tip.textContent='✨ 自动识别：'+zodiacMeta.e+' '+zodiac+'座 - '+zodiacMeta.desc;
      }
    }
  }

  // 添加事件监听器
  sm.addEventListener('change',updateZodiac);
  sd.addEventListener('change',updateZodiac);

  // 初始化时立即执行一次
  setTimeout(updateZodiac,100);

  var danmus=[
    '张三测算了今天宜吃麻辣香锅 🍲',
    '李四今天忌火锅，忍住了！🔥',
    '王五发现今天宜吃海鲜 🦐',
    '赵六连续测算7天了 📊',
    '小陈今天宜吃黄焖鸡 🍗',
  ];
  var di=0;
  setInterval(function(){
    document.getElementById('danmu').textContent=danmus[di%danmus.length];
    di++;
  },3500);
})();
</script>
