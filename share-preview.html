<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #dce9ff 0%, #e8d5f5 50%, #f0e6ff 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.container {
  text-align: center;
  padding: 40px;
}
.title {
  font-size: 72px;
  color: #d4a853;
  font-weight: bold;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}
.subtitle {
  font-size: 36px;
  color: #444;
  margin-bottom: 30px;
}
.features {
  display: flex;
  gap: 40px;
  justify-content: center;
  margin-top: 40px;
}
.feature {
  background: rgba(255,255,255,0.9);
  padding: 20px 30px;
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(100,80,160,0.08);
}
.feature-icon {
  font-size: 48px;
  margin-bottom: 10px;
}
.feature-text {
  font-size: 24px;
  color: #2c3e50;
  font-weight: 500;
}
.bagua {
  font-size: 120px;
  color: #d4a853;
  margin: 20px 0;
  opacity: 0.8;
}
.footer {
  margin-top: 30px;
  font-size: 20px;
  color: #666;
}
</style>
</head>
<body>
<div class="container">
  <div class="bagua">☯</div>
  <div class="title">🔮 今日食运</div>
  <div class="subtitle">五行八卦 · 测算今日宜忌</div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🍲</div>
      <div class="feature-text">150+菜品</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🎨</div>
      <div class="feature-text">幸运色</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🧭</div>
      <div class="feature-text">吉利方向</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔢</div>
      <div class="feature-text">幸运数字</div>
    </div>
  </div>

  <div class="footer">输入生日，秒算今日宜忌！</div>
</div>
</body>
</html>
